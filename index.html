<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lottery · 추첨기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --bg: oklch(0.97 0.01 230);
      --bg-band: oklch(0.93 0.02 230);
      --ink: oklch(0.22 0.035 250);
      --ink-muted: oklch(0.5 0.025 250);
      --surface: oklch(0.99 0.005 230);
      --line: oklch(0.86 0.02 230);
      --accent: oklch(0.58 0.19 25);
      --accent-ink: oklch(0.98 0.01 25);
      --accent-hover: oklch(0.5 0.18 22);
      --ball-1: oklch(0.84 0.12 95);
      --ball-2: oklch(0.72 0.11 245);
      --ball-3: oklch(0.66 0.17 25);
      --ball-4: oklch(0.78 0.015 250);
      --ball-5: oklch(0.72 0.11 155);
      --radius-ctl: 8px;
      --radius-chip: 6px;
      --space: 8px;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-move: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-exit: cubic-bezier(0.55, 0, 1, 0.45);
      --dur-enter: 420ms;
      --dur-fast: 180ms;
      --shadow:
        0 1px 1px oklch(0.35 0.03 250 / 0.05),
        0 3px 6px oklch(0.35 0.03 250 / 0.06),
        0 10px 24px oklch(0.35 0.03 250 / 0.07);
      --font-display: "Big Shoulders Display", "Arial Narrow", sans-serif;
      --font-body: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", sans-serif;
      --control-h: 48px;
    }

    [hidden] { display: none !important; }

    *, *::before, *::after { box-sizing: border-box; }

    html { height: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.65;
      color: var(--ink);
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent calc(var(--space) * 4 - 1px),
          oklch(0.9 0.015 230 / 0.55) calc(var(--space) * 4 - 1px),
          oklch(0.9 0.015 230 / 0.55) calc(var(--space) * 4)
        );
      background-size: calc(var(--space) * 4) 100%;
      word-break: keep-all;
      overflow-wrap: anywhere;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: minmax(260px, 0.9fr) minmax(0, 1.4fr);
      max-width: 1120px;
      margin: 0 auto;
    }

    .rail {
      padding: calc(var(--space) * 6) calc(var(--space) * 4);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: calc(var(--space) * 5);
      border-right: 1px solid var(--line);
      background: var(--surface);
      animation: enter-rail var(--dur-enter) var(--ease-out) both;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 2);
    }

    .brand__rule {
      width: 40px;
      height: 3px;
      background: var(--accent);
      border-radius: 1px;
      transform-origin: left center;
      animation: rule-draw 480ms var(--ease-out) 80ms both;
    }

    .brand__mark {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(3.5rem, 8vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      text-transform: lowercase;
      color: var(--ink);
      text-wrap: balance;
      animation: enter-up var(--dur-enter) var(--ease-out) 120ms both;
    }

    .brand__lede {
      margin: 0;
      max-width: 22rem;
      font-size: 1.05rem;
      font-weight: 450;
      line-height: 1.65;
      color: var(--ink-muted);
      text-wrap: pretty;
      animation: enter-up var(--dur-enter) var(--ease-out) 180ms both;
    }

    .spec {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: calc(var(--space) * 1) calc(var(--space) * 2);
      margin: 0;
      padding: 0;
      font-size: 0.875rem;
      animation: enter-up var(--dur-enter) var(--ease-out) 240ms both;
    }

    .spec dt {
      margin: 0;
      color: var(--ink-muted);
      font-weight: 500;
    }

    .spec dd {
      margin: 0;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .stage {
      padding: calc(var(--space) * 5) calc(var(--space) * 4);
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 4);
      justify-content: center;
      background:
        linear-gradient(180deg, var(--bg-band) 0%, var(--bg) 42%);
      animation: enter-stage var(--dur-enter) var(--ease-out) 100ms both;
    }

    .trough {
      position: relative;
      padding: calc(var(--space) * 4) 0 calc(var(--space) * 3);
      border-top: 2px dashed var(--line);
      border-bottom: 2px dashed var(--line);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: calc(var(--space) * 2);
      transition: border-color 200ms var(--ease-out), background-color 200ms var(--ease-out);
    }

    .trough.is-drawing {
      border-color: oklch(0.7 0.08 25 / 0.55);
      background: linear-gradient(
        90deg,
        transparent 0%,
        oklch(0.58 0.19 25 / 0.06) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: trough-shimmer 0.9s linear infinite;
    }

    .trough__label {
      position: absolute;
      top: calc(var(--space) * -1.5);
      left: 0;
      padding: 0 calc(var(--space) * 1);
      background: var(--bg-band);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: -0.01em;
    }

    .empty {
      margin: 0;
      color: var(--ink-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 2.5);
    }

    .set-row {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 1);
    }

    .set-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: calc(var(--space) * 1.5);
      align-items: center;
    }

    .ball {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      border: 2px solid oklch(0.3 0.04 250 / 0.12);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px) scale(0.92);
      will-change: transform, opacity;
    }

    .ball.is-in {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: pop-in 380ms var(--ease-out) both;
    }

    .ball.is-spinning {
      opacity: 1;
      animation: tick 0.22s var(--ease-move) infinite alternate;
    }

    @keyframes tick {
      from { transform: translateY(-2px) rotate(-3deg); }
      to { transform: translateY(3px) rotate(3deg); }
    }

    @keyframes pop-in {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.9);
      }
      70% {
        opacity: 1;
        transform: translateY(-3px) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes enter-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes enter-rail {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes enter-stage {
      from {
        opacity: 0;
        transform: translateX(16px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes rule-draw {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes trough-shimmer {
      from { background-position: 100% 0; }
      to { background-position: -100% 0; }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes row-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .ball--r1 { background: var(--ball-1); }
    .ball--r2 { background: var(--ball-2); color: oklch(0.98 0.01 245); border-color: oklch(0.45 0.08 245 / 0.25); }
    .ball--r3 { background: var(--ball-3); color: oklch(0.98 0.01 25); border-color: oklch(0.45 0.1 25 / 0.25); }
    .ball--r4 { background: var(--ball-4); }
    .ball--r5 { background: var(--ball-5); color: oklch(0.98 0.01 155); border-color: oklch(0.45 0.08 155 / 0.25); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: calc(var(--space) * 2);
      animation: enter-up var(--dur-enter) var(--ease-out) 220ms both;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 0.75);
    }

    .field label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .select-shell {
      position: relative;
      display: inline-block;
    }

    .select-shell::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid var(--ink-muted);
      border-bottom: 2px solid var(--ink-muted);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    .field select {
      height: var(--control-h);
      min-width: 88px;
      padding: 0 40px 0 calc(var(--space) * 2);
      border: 1px solid var(--line);
      border-radius: var(--radius-ctl);
      background-color: var(--surface);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .field select:focus-visible,
    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .btn {
      height: var(--control-h);
      padding: 0 calc(var(--space) * 3.5);
      border: none;
      border-radius: 9999px;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.9375rem;
      letter-spacing: -0.02em;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: background-color 140ms var(--ease-out);
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { cursor: wait; opacity: 0.72; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: calc(var(--space) * 1) calc(var(--space) * 2);
      margin: 0;
      font-size: 0.875rem;
      color: var(--ink-muted);
      animation: fade-in var(--dur-fast) var(--ease-out) both;
    }

    .meta strong {
      color: var(--ink);
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .history {
      margin-top: auto;
      animation: enter-up 320ms var(--ease-out) both;
    }

    .history h2 {
      margin: 0 0 calc(var(--space) * 1.5);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-muted);
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
    }

    .history-list li {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: calc(var(--space) * 1.5);
      align-items: center;
      padding: calc(var(--space) * 1.5) 0;
      border-bottom: 1px solid oklch(0.9 0.015 230);
      font-variant-numeric: tabular-nums;
      animation: row-in 280ms var(--ease-out) both;
    }

    .history-list li:nth-child(1) { animation-delay: 0ms; }
    .history-list li:nth-child(2) { animation-delay: 40ms; }
    .history-list li:nth-child(3) { animation-delay: 80ms; }
    .history-list li:nth-child(4) { animation-delay: 120ms; }

    .history-list .when {
      font-size: 0.8125rem;
      color: var(--ink-muted);
      font-weight: 500;
    }

    .history-list .nums {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      border-radius: var(--radius-chip);
      background: var(--bg-band);
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 800px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .rail {
        border-right: none;
        border-bottom: 1px solid var(--line);
        padding: calc(var(--space) * 4) calc(var(--space) * 3);
        gap: calc(var(--space) * 3);
      }

      .brand__mark {
        font-size: clamp(3.25rem, 16vw, 4.5rem);
      }

      .stage {
        padding: calc(var(--space) * 4) calc(var(--space) * 3) calc(var(--space) * 6);
      }

      .ball {
        width: 52px;
        height: 52px;
        font-size: 1.25rem;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .select-shell,
      .field select,
      .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .rail,
      .brand__rule,
      .brand__mark,
      .brand__lede,
      .spec,
      .stage,
      .controls,
      .meta,
      .history,
      .history-list li,
      .ball.is-in {
        animation: fade-in 160ms linear both;
        transform: none;
      }

      .ball.is-spinning,
      .trough.is-drawing {
        animation: none;
      }

      .trough.is-drawing {
        background: oklch(0.58 0.19 25 / 0.05);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="rail">
      <header class="brand">
        <div class="brand__rule" aria-hidden="true"></div>
        <h1 class="brand__mark">lottery</h1>
        <p class="brand__lede">1부터 45까지, 여섯 개. 버튼을 누르면 바로 뽑습니다.</p>
      </header>

      <dl class="spec">
        <dt>범위</dt>
        <dd>1 ~ 45</dd>
        <dt>개수</dt>
        <dd>6</dd>
        <dt>방식</dt>
        <dd>무작위</dd>
      </dl>
    </aside>

    <main class="stage">
      <section class="trough" aria-labelledby="result-label">
        <span class="trough__label" id="result-label">추첨 결과</span>

        <p class="empty" id="empty">아직 번호가 없습니다. 아래에서 세트를 고른 뒤 추첨하세요.</p>
        <div class="results" id="results" hidden aria-live="polite"></div>
      </section>

      <div class="controls">
        <div class="field">
          <label for="sets">세트</label>
          <div class="select-shell">
            <select id="sets" name="sets">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn" id="draw">번호 추첨</button>
      </div>

      <p class="meta" id="meta" hidden>
        이번 회차 <strong id="drawn-at"></strong>
        · 조합 <strong id="combo-count">0</strong>개
      </p>

      <section class="history" id="history-wrap" hidden>
        <h2>최근 추첨</h2>
        <ol class="history-list" id="history"></ol>
        <p class="meta" id="db-status" hidden></p>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const POOL = 45;
    const PICK = 6;
    const STAGGER_MS = 65;
    const SPIN_MS = 520;
    const HISTORY_LIMIT = 12;

    // Public anon key + RLS (select/insert on lotto_draw only)
    const SUPABASE_URL = "https://uuqpsswvpebtawpcgvaa.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1cXBzc3d2cGVidGF3cGNndmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjE5MzMsImV4cCI6MjA5NzU5NzkzM30.sXpeYxjA55mvq4z0jK-Id4HUOY-rz3rR7TP6_XO3I7c";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      empty: document.getElementById("empty"),
      results: document.getElementById("results"),
      draw: document.getElementById("draw"),
      sets: document.getElementById("sets"),
      meta: document.getElementById("meta"),
      drawnAt: document.getElementById("drawn-at"),
      comboCount: document.getElementById("combo-count"),
      historyWrap: document.getElementById("history-wrap"),
      history: document.getElementById("history"),
      trough: document.querySelector(".trough"),
      dbStatus: document.getElementById("db-status"),
    };

    let drawing = false;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function ballRange(n) {
      if (n <= 10) return 1;
      if (n <= 20) return 2;
      if (n <= 30) return 3;
      if (n <= 40) return 4;
      return 5;
    }

    function pickNumbers() {
      const bag = Array.from({ length: POOL }, (_, i) => i + 1);
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
      return bag.slice(0, PICK).sort((a, b) => a - b);
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatTime(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setDbStatus(message, isError = false) {
      if (!message) {
        els.dbStatus.hidden = true;
        els.dbStatus.textContent = "";
        return;
      }
      els.dbStatus.hidden = false;
      els.dbStatus.textContent = message;
      els.dbStatus.style.color = isError ? "var(--accent)" : "var(--ink-muted)";
    }

    function makeBall(n, { spinning = false, delay = 0 } = {}) {
      const el = document.createElement("span");
      el.className = `ball ball--r${ballRange(n)}${spinning ? " is-spinning" : ""}`;
      el.textContent = n;
      if (!spinning && !reduceMotion) {
        el.style.animationDelay = `${delay}ms`;
      }
      if (spinning) el.classList.add("is-in");
      return el;
    }

    function renderSets(sets, { spinning = false } = {}) {
      els.results.hidden = false;
      els.empty.hidden = true;
      els.results.innerHTML = "";

      const showLabel = sets.length > 1;
      const balls = [];

      sets.forEach((numbers, setIndex) => {
        const row = document.createElement("div");
        row.className = "set-row";

        if (showLabel) {
          const label = document.createElement("div");
          label.className = "set-label";
          label.textContent = `세트 ${setIndex + 1}`;
          row.appendChild(label);
        }

        const wrap = document.createElement("div");
        wrap.className = "balls";
        numbers.forEach((n, i) => {
          const delay = (setIndex * PICK + i) * STAGGER_MS;
          const ball = makeBall(n, { spinning, delay });
          wrap.appendChild(ball);
          balls.push(ball);
        });
        row.appendChild(wrap);
        els.results.appendChild(row);
      });

      if (!spinning) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            balls.forEach((el) => el.classList.add("is-in"));
          });
        });
      }
    }

    function renderHistory(rows) {
      if (!rows.length) {
        els.historyWrap.hidden = true;
        return;
      }

      els.historyWrap.hidden = false;
      els.historyWrap.style.animation = "none";
      void els.historyWrap.offsetWidth;
      els.historyWrap.style.animation = "";

      els.history.innerHTML = rows
        .map((row) => {
          const at = new Date(row.created_at);
          const nums = row.numbers;
          return `
          <li>
            <span class="when">${formatTime(at)}</span>
            <span class="nums">${nums.map((n) => `<span class="chip">${n}</span>`).join("")}</span>
          </li>`;
        })
        .join("");
    }

    async function loadHistory() {
      const { data, error } = await db
        .from("lotto_draw")
        .select("id, numbers, created_at")
        .order("created_at", { ascending: false })
        .limit(HISTORY_LIMIT);

      if (error) {
        setDbStatus("기록 불러오기 실패: " + error.message, true);
        return;
      }

      setDbStatus("");
      renderHistory(data || []);
    }

    async function saveDraws(sets) {
      const payload = sets.map((numbers) => ({ numbers }));
      const { error } = await db.from("lotto_draw").insert(payload);
      if (error) {
        setDbStatus("저장 실패: " + error.message, true);
        return false;
      }
      setDbStatus("");
      return true;
    }

    async function runDraw() {
      if (drawing) return;
      drawing = true;
      els.draw.disabled = true;
      els.trough.classList.add("is-drawing");

      const count = Number(els.sets.value) || 1;
      const sets = Array.from({ length: count }, () => pickNumbers());

      if (!reduceMotion) {
        renderSets(
          [Array.from({ length: PICK }, () => 1 + Math.floor(Math.random() * POOL))],
          { spinning: true }
        );
        await sleep(SPIN_MS);
      }

      renderSets(sets);

      const now = new Date();
      els.meta.hidden = false;
      els.meta.style.animation = "none";
      void els.meta.offsetWidth;
      els.meta.style.animation = "";
      els.drawnAt.textContent = formatTime(now);
      els.comboCount.textContent = String(count);

      await saveDraws(sets);
      await loadHistory();

      els.trough.classList.remove("is-drawing");
      drawing = false;
      els.draw.disabled = false;
      els.draw.focus();
    }

    els.draw.addEventListener("click", runDraw);
    loadHistory();
  </script>
</body>
</html>
