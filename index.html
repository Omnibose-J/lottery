<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="1부터 45까지 여섯 개 번호를 뽑고, 추첨 기록을 저장하는 Lottery" />
  <title>Lottery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --ink: #1d1d1f;
      --ink-soft: #6e6e73;
      --ink-faint: #86868b;
      --line: #d2d2d7;
      --apple: #de071c;
      --apple-hover: #b00516;
      --apple-soft: rgba(222, 7, 28, 0.1);
      --leaf: #34c759;
      --btn: #de071c;
      --btn-hover: #b00516;
      --btn-ink: #ffffff;
      --ball-1: #f5d76e;
      --ball-2: #5b9bd5;
      --ball-3: #e85d4c;
      --ball-4: #c7c7cc;
      --ball-5: #6bcb77;
      --space: 8px;
      --control-h: 44px;
      --radius-ctl: 12px;
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
      --font: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    }

    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 400;
      line-height: 1.47059;
      letter-spacing: -0.022em;
      color: var(--ink);
      background:
        radial-gradient(900px 420px at 50% -80px, rgba(222, 7, 28, 0.1), transparent 60%),
        radial-gradient(700px 360px at 85% 18%, rgba(52, 199, 89, 0.1), transparent 55%),
        var(--bg);
      word-break: keep-all;
      overflow-wrap: anywhere;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: rgba(251, 251, 253, 0.8);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .nav__mark {
      margin: 0;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .nav__link {
      border: none;
      background: none;
      padding: 0;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      color: var(--apple);
      cursor: pointer;
    }

    .nav__link:hover { color: var(--apple-hover); text-decoration: underline; }

    .nav__link:focus-visible,
    .btn:focus-visible,
    .btn-ghost:focus-visible,
    .btn-icon:focus-visible,
    .field select:focus-visible {
      outline: 2px solid var(--apple);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 64px 24px 40px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfd 100%);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(2px);
    }

    .hero::before {
      width: 220px;
      height: 220px;
      top: -60px;
      left: calc(50% - 280px);
      background: radial-gradient(circle, rgba(222, 7, 28, 0.2), transparent 70%);
    }

    .hero::after {
      width: 180px;
      height: 180px;
      top: 20px;
      right: calc(50% - 260px);
      background: radial-gradient(circle, rgba(52, 199, 89, 0.18), transparent 70%);
    }

    .hero__inner {
      position: relative;
      z-index: 1;
    }

    .hero__title {
      margin: 0 0 12px;
      font-size: clamp(40px, 8vw, 56px);
      font-weight: 600;
      line-height: 1.07143;
      letter-spacing: -0.005em;
      text-wrap: balance;
    }

    .hero__copy {
      margin: 0 auto;
      max-width: 480px;
      font-size: 19px;
      line-height: 1.4211;
      font-weight: 400;
      color: var(--ink-soft);
      text-wrap: pretty;
    }

    .panel {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .stage {
      position: relative;
      overflow: hidden;
      margin-top: -8px;
      padding: 48px 40px 40px;
      border-radius: 28px;
      background:
        radial-gradient(480px 180px at 50% 18%, rgba(222, 7, 28, 0.1), transparent 70%),
        linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.8) inset,
        0 8px 30px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .stage__glow {
      position: absolute;
      inset: auto 10% 42% 10%;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, var(--apple-soft), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .stage > *:not(.stage__glow) {
      position: relative;
      z-index: 1;
    }

    .trough {
      position: relative;
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .trough__ring {
      position: absolute;
      width: min(420px, 90%);
      height: 96px;
      border-radius: 999px;
      border: 1px dashed rgba(0, 0, 0, 0.08);
      pointer-events: none;
      z-index: 0;
    }

    .trough > :not(.trough__ring) {
      position: relative;
      z-index: 1;
    }

    .trough.is-drawing {
      transition: opacity 200ms var(--ease);
      opacity: 0.85;
    }

    .empty {
      margin: 0;
      max-width: 360px;
      text-align: center;
      font-size: 17px;
      color: var(--ink-faint);
      line-height: 1.47;
    }

    .results {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .set-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .set-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-faint);
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .ball {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 21px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--ink);
      border: none;
      box-shadow:
        inset 0 -8px 14px rgba(0, 0, 0, 0.12),
        inset 0 5px 10px rgba(255, 255, 255, 0.45),
        0 4px 12px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(8px);
      overflow: hidden;
      isolation: isolate;
    }

    .ball__n { position: relative; z-index: 2; }

    .ball::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.55), transparent 42%),
        radial-gradient(circle at 70% 78%, rgba(0, 0, 0, 0.12), transparent 48%);
      pointer-events: none;
      z-index: 1;
    }

    .ball::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0.3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      pointer-events: none;
      z-index: 1;
    }

    .ball.is-in {
      opacity: 1;
      transform: translateY(0);
      animation: float-in 500ms var(--ease);
      transition: transform 220ms var(--ease), box-shadow 220ms var(--ease);
    }

    .ball.is-in:not(.is-spinning):hover {
      transform: translateY(-4px);
      box-shadow:
        inset 0 -8px 14px rgba(0, 0, 0, 0.12),
        inset 0 5px 10px rgba(255, 255, 255, 0.45),
        0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .ball.is-spinning {
      opacity: 1;
      animation: float-tick 0.35s var(--ease) infinite alternate;
    }

    .ball--r1 { background: var(--ball-1); }
    .ball--r2 { background: var(--ball-2); color: #fff; }
    .ball--r3 { background: var(--ball-3); color: #fff; }
    .ball--r4 { background: var(--ball-4); }
    .ball--r5 { background: var(--ball-5); color: #fff; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: end;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-faint);
    }

    .select-shell { position: relative; display: inline-block; }

    .select-shell::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-right: 1.5px solid var(--ink-soft);
      border-bottom: 1.5px solid var(--ink-soft);
      transform: translateY(-70%) rotate(45deg);
      pointer-events: none;
    }

    .field select {
      height: var(--control-h);
      min-width: 88px;
      padding: 0 36px 0 14px;
      border: 1px solid var(--line);
      border-radius: 980px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    .btn {
      height: var(--control-h);
      padding: 0 22px;
      border: none;
      border-radius: 980px;
      background: var(--btn);
      color: var(--btn-ink);
      font: inherit;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background-color 180ms var(--ease);
    }

    .btn:hover { background: var(--btn-hover); }
    .btn:disabled { cursor: wait; opacity: 0.55; }

    .meta {
      margin: 20px 0 0;
      text-align: center;
      font-size: 14px;
      color: var(--ink-faint);
    }

    .meta strong {
      color: var(--ink-soft);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .history {
      position: relative;
      overflow: hidden;
      margin-top: 20px;
      padding: 28px 32px;
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.95)),
        radial-gradient(400px 160px at 100% 0%, rgba(52, 199, 89, 0.12), transparent 60%),
        var(--surface);
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    .history-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .history h2 {
      margin: 0;
      font-size: 21px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .history-scroll {
      max-height: 220px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .history-list li {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      font-variant-numeric: tabular-nums;
    }

    .history-list li:last-child { border-bottom: none; }

    .history-list .when {
      font-size: 14px;
      color: var(--ink-faint);
    }

    .history-list .nums {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      border-radius: 980px;
      background: var(--bg);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .history-dialog {
      width: min(520px, calc(100vw - 2rem));
      max-height: min(80dvh, 640px);
      margin: auto;
      padding: 0;
      border: none;
      border-radius: 18px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .history-dialog[open] {
      display: flex;
      flex-direction: column;
    }

    .history-dialog::backdrop {
      background: rgba(0, 0, 0, 0.4);
    }

    .history-dialog__bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .history-dialog__bar h2 {
      margin: 0;
      font-size: 19px;
      font-weight: 600;
    }

    .history-dialog__body {
      flex: 1 1 auto;
      min-height: 0;
      padding: 4px 20px 20px;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .history-dialog .history-list li {
      grid-template-columns: 7rem 1fr;
    }

    .history-dialog__more {
      margin-top: 16px;
      width: 100%;
    }

    .btn-ghost {
      height: 36px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 980px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-ghost:hover { background: var(--bg); }

    .btn-icon {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: var(--bg);
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
    }

    .btn-icon:hover { color: var(--ink); }

    @keyframes float-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float-tick {
      from { transform: translateY(-2px); }
      to { transform: translateY(2px); }
    }

    @media (max-width: 734px) {
      .hero { padding: 48px 20px 32px; }
      .hero__title { font-size: 36px; }
      .hero__copy { font-size: 17px; }
      .stage { padding: 32px 20px 28px; border-radius: 20px; }
      .ball { width: 52px; height: 52px; font-size: 17px; }
      .controls { flex-direction: column; align-items: stretch; }
      .field { width: 100%; }
      .select-shell, .field select, .btn { width: 100%; }
      .history { padding: 22px 20px; border-radius: 20px; }
      .history-scroll { max-height: 180px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ball.is-in {
        animation: none;
        opacity: 1;
        transform: none;
      }
      .ball.is-spinning { animation: none; }
      .ball.is-in:not(.is-spinning):hover { transform: none; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <p class="nav__mark">Lottery</p>
    <button type="button" class="nav__link" id="open-all-history">전체기록 보기</button>
  </nav>

  <header class="hero">
    <div class="hero__inner">
      <h1 class="hero__title">Lottery</h1>
      <p class="hero__copy">버튼을 누르면 여섯 개 번호가 뽑히고, 추첨 기록이 저장됩니다.</p>
    </div>
  </header>

  <div class="panel">
    <section class="stage" aria-labelledby="result-label">
      <div class="stage__glow" aria-hidden="true"></div>
      <h2 class="sr-only" id="result-label">추첨 결과</h2>

      <div class="trough" id="trough">
        <div class="trough__ring" aria-hidden="true"></div>
        <p class="empty" id="empty">아직 번호가 없습니다. 세트를 고른 뒤 추첨하세요.</p>
        <div class="results" id="results" hidden aria-live="polite"></div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="sets">세트</label>
          <div class="select-shell">
            <select id="sets" name="sets">
              <option value="1" selected>1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="5">5</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn" id="draw">번호 추첨</button>
      </div>

      <p class="meta" id="meta" hidden>
        이번 회차 <strong id="drawn-at"></strong>
        · 조합 <strong id="combo-count">0</strong>개
      </p>
      <p class="meta" id="db-status" hidden></p>
    </section>

    <section class="history" id="history-wrap" hidden>
      <div class="history-head">
        <h2>최근 추첨</h2>
      </div>
      <div class="history-scroll">
        <ol class="history-list" id="history"></ol>
      </div>
    </section>
  </div>

  <dialog class="history-dialog" id="history-dialog" aria-labelledby="history-dialog-title">
    <div class="history-dialog__bar">
      <h2 id="history-dialog-title">전체 추첨 기록</h2>
      <button type="button" class="btn-icon" id="close-all-history" aria-label="닫기">×</button>
    </div>
    <div class="history-dialog__body">
      <ol class="history-list" id="history-all"></ol>
      <button type="button" class="btn-ghost history-dialog__more" id="load-more-history" hidden>더 보기</button>
      <p class="meta" id="all-db-status" hidden></p>
    </div>
  </dialog>

  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const POOL = 45;
    const PICK = 6;
    const STAGGER_MS = 70;
    const SPIN_MS = 480;
    const HISTORY_LIMIT = 40;
    const PAGE_SIZE = 30;

    const SUPABASE_URL = "https://uuqpsswvpebtawpcgvaa.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1cXBzc3d2cGVidGF3cGNndmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjE5MzMsImV4cCI6MjA5NzU5NzkzM30.sXpeYxjA55mvq4z0jK-Id4HUOY-rz3rR7TP6_XO3I7c";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      empty: document.getElementById("empty"),
      results: document.getElementById("results"),
      draw: document.getElementById("draw"),
      sets: document.getElementById("sets"),
      meta: document.getElementById("meta"),
      drawnAt: document.getElementById("drawn-at"),
      comboCount: document.getElementById("combo-count"),
      historyWrap: document.getElementById("history-wrap"),
      history: document.getElementById("history"),
      trough: document.getElementById("trough"),
      dbStatus: document.getElementById("db-status"),
      openAll: document.getElementById("open-all-history"),
      closeAll: document.getElementById("close-all-history"),
      dialog: document.getElementById("history-dialog"),
      historyAll: document.getElementById("history-all"),
      loadMore: document.getElementById("load-more-history"),
      allDbStatus: document.getElementById("all-db-status"),
    };

    let drawing = false;
    let allOffset = 0;
    let allTotal = 0;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function ballRange(n) {
      if (n <= 10) return 1;
      if (n <= 20) return 2;
      if (n <= 30) return 3;
      if (n <= 40) return 4;
      return 5;
    }

    function pickNumbers() {
      const bag = Array.from({ length: POOL }, (_, i) => i + 1);
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
      return bag.slice(0, PICK).sort((a, b) => a - b);
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatTime(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatDateTime(d) {
      return `${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${formatTime(d)}`;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setStatus(el, message, isError = false) {
      if (!message) {
        el.hidden = true;
        el.textContent = "";
        return;
      }
      el.hidden = false;
      el.textContent = message;
      el.style.color = isError ? "var(--apple)" : "var(--ink-faint)";
    }

    function setDbStatus(message, isError = false) {
      setStatus(els.dbStatus, message, isError);
    }

    function historyItemHtml(row, { withDate = false } = {}) {
      const at = new Date(row.created_at);
      const label = withDate ? formatDateTime(at) : formatTime(at);
      return `
        <li>
          <span class="when">${label}</span>
          <span class="nums">${row.numbers.map((n) => `<span class="chip">${n}</span>`).join("")}</span>
        </li>`;
    }

    function makeBall(n, { spinning = false, delay = 0 } = {}) {
      const el = document.createElement("span");
      el.className = `ball ball--r${ballRange(n)}${spinning ? " is-spinning" : ""}`;
      el.innerHTML = `<span class="ball__n">${n}</span>`;
      if (!spinning && !reduceMotion) el.style.animationDelay = `${delay}ms`;
      if (spinning) el.classList.add("is-in");
      return el;
    }

    function renderSets(sets, { spinning = false } = {}) {
      els.results.hidden = false;
      els.empty.hidden = true;
      els.results.innerHTML = "";

      const showLabel = sets.length > 1;
      const balls = [];

      sets.forEach((numbers, setIndex) => {
        const row = document.createElement("div");
        row.className = "set-row";

        if (showLabel) {
          const label = document.createElement("div");
          label.className = "set-label";
          label.textContent = `세트 ${setIndex + 1}`;
          row.appendChild(label);
        }

        const wrap = document.createElement("div");
        wrap.className = "balls";
        numbers.forEach((n, i) => {
          const ball = makeBall(n, {
            spinning,
            delay: (setIndex * PICK + i) * STAGGER_MS,
          });
          wrap.appendChild(ball);
          balls.push(ball);
        });
        row.appendChild(wrap);
        els.results.appendChild(row);
      });

      if (!spinning) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => balls.forEach((el) => el.classList.add("is-in")));
        });
      }
    }

    function renderHistory(rows) {
      if (!rows.length) {
        els.historyWrap.hidden = true;
        return;
      }
      els.historyWrap.hidden = false;
      els.history.innerHTML = rows.map((row) => historyItemHtml(row)).join("");
    }

    async function loadHistory() {
      const { data, error } = await db
        .from("lotto_draw")
        .select("id, numbers, created_at")
        .order("created_at", { ascending: false })
        .limit(HISTORY_LIMIT);

      if (error) {
        setDbStatus("기록 불러오기 실패: " + error.message, true);
        return;
      }
      setDbStatus("");
      renderHistory(data || []);
    }

    async function fetchHistoryPage(offset, append) {
      const { data, error, count } = await db
        .from("lotto_draw")
        .select("id, numbers, created_at", { count: "exact" })
        .order("created_at", { ascending: false })
        .range(offset, offset + PAGE_SIZE - 1);

      if (error) {
        setStatus(els.allDbStatus, "전체 기록 불러오기 실패: " + error.message, true);
        return;
      }

      setStatus(els.allDbStatus, "");
      allTotal = count ?? allTotal;
      const rows = data || [];
      const html = rows.map((row) => historyItemHtml(row, { withDate: true })).join("");

      if (append) els.historyAll.insertAdjacentHTML("beforeend", html);
      else els.historyAll.innerHTML = html || "<li><span class=\"when\">기록 없음</span></li>";

      allOffset = offset + rows.length;
      els.loadMore.hidden = allOffset >= allTotal || rows.length === 0;
    }

    async function openAllHistory() {
      allOffset = 0;
      allTotal = 0;
      els.historyAll.innerHTML = "";
      els.loadMore.hidden = true;
      els.dialog.showModal();
      await fetchHistoryPage(0, false);
    }

    async function saveDraws(sets) {
      const { error } = await db.from("lotto_draw").insert(sets.map((numbers) => ({ numbers })));
      if (error) {
        setDbStatus("저장 실패: " + error.message, true);
        return false;
      }
      setDbStatus("");
      return true;
    }

    async function runDraw() {
      if (drawing) return;
      drawing = true;
      els.draw.disabled = true;
      els.trough.classList.add("is-drawing");

      const count = Number(els.sets.value) || 1;
      const sets = Array.from({ length: count }, () => pickNumbers());

      if (!reduceMotion) {
        renderSets(
          [Array.from({ length: PICK }, () => 1 + Math.floor(Math.random() * POOL))],
          { spinning: true }
        );
        await sleep(SPIN_MS);
      }

      renderSets(sets);

      const now = new Date();
      els.meta.hidden = false;
      els.drawnAt.textContent = formatTime(now);
      els.comboCount.textContent = String(count);

      await saveDraws(sets);
      await loadHistory();

      els.trough.classList.remove("is-drawing");
      drawing = false;
      els.draw.disabled = false;
      els.draw.focus();
    }

    els.draw.addEventListener("click", runDraw);
    els.openAll.addEventListener("click", openAllHistory);
    els.closeAll.addEventListener("click", () => els.dialog.close());
    els.loadMore.addEventListener("click", () => fetchHistoryPage(allOffset, true));
    els.dialog.addEventListener("click", (e) => {
      if (e.target === els.dialog) els.dialog.close();
    });
    loadHistory();
  </script>
</body>
</html>
