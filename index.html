<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="1부터 45까지 여섯 개 번호를 뽑고, 추첨 기록을 저장하는 lottery" />
  <title>lottery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      --bg: oklch(0.965 0.008 240);
      --bg-elevated: oklch(0.985 0.004 240);
      --surface: oklch(0.995 0.002 240);
      --ink: oklch(0.2 0.03 255);
      --ink-soft: oklch(0.42 0.02 255);
      --ink-faint: oklch(0.62 0.015 255);
      --line: oklch(0.9 0.012 240);
      --line-strong: oklch(0.82 0.015 240);
      --accent: oklch(0.55 0.2 28);
      --accent-soft: oklch(0.55 0.2 28 / 0.1);
      --accent-ink: oklch(0.99 0.01 28);
      --accent-hover: oklch(0.48 0.19 25);
      --ball-1: oklch(0.86 0.11 95);
      --ball-2: oklch(0.7 0.12 250);
      --ball-3: oklch(0.64 0.18 28);
      --ball-4: oklch(0.8 0.012 250);
      --ball-5: oklch(0.72 0.11 155);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --space: 8px;
      --control-h: 48px;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-move: cubic-bezier(0.77, 0, 0.175, 1);
      --dur: 400ms;
      --shadow-sm:
        0 1px 1px oklch(0.3 0.03 255 / 0.04),
        0 2px 4px oklch(0.3 0.03 255 / 0.04);
      --shadow:
        0 1px 1px oklch(0.3 0.03 255 / 0.04),
        0 4px 10px oklch(0.3 0.03 255 / 0.05),
        0 16px 32px oklch(0.3 0.03 255 / 0.06);
      --font-display: "Big Shoulders Display", "Arial Narrow", sans-serif;
      --font-body: "Pretendard Variable", Pretendard, "Apple SD Gothic Neo", sans-serif;
    }

    [hidden] { display: none !important; }
    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: -0.011em;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 0% -10%, oklch(0.94 0.02 28 / 0.35), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, oklch(0.94 0.025 250 / 0.4), transparent 50%),
        var(--bg);
      word-break: keep-all;
      overflow-wrap: anywhere;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(1120px, calc(100% - 2rem));
      margin: 0 auto;
      padding: calc(var(--space) * 3) 0 calc(var(--space) * 6);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 3);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: calc(var(--space) * 2);
      padding: calc(var(--space) * 1.5) calc(var(--space) * 0.5);
      animation: rise var(--dur) var(--ease-out) both;
    }

    .topbar__brand {
      display: flex;
      align-items: center;
      gap: calc(var(--space) * 1.5);
      min-width: 0;
    }

    .topbar__mark {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.75rem;
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: lowercase;
    }

    .topbar__badge {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 9999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 650;
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
    }

    .link-btn {
      border: none;
      background: none;
      padding: 0;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 650;
      color: var(--accent);
      cursor: pointer;
      transition: color 140ms var(--ease-out);
    }

    .link-btn:hover { color: var(--accent-hover); }
    .link-btn:focus-visible,
    .btn:focus-visible,
    .btn-ghost:focus-visible,
    .btn-icon:focus-visible,
    .field select:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(240px, 0.78fr) minmax(0, 1.45fr);
      gap: calc(var(--space) * 3);
      flex: 1;
      align-items: stretch;
    }

    .rail {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: calc(var(--space) * 4);
      padding: calc(var(--space) * 4);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      animation: rise var(--dur) var(--ease-out) 60ms both;
    }

    .brand__rule {
      width: 36px;
      height: 3px;
      border-radius: 1px;
      background: var(--accent);
      transform-origin: left center;
      animation: rule 520ms var(--ease-out) 120ms both;
    }

    .brand__title {
      margin: calc(var(--space) * 2) 0 calc(var(--space) * 1.5);
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(3.25rem, 7vw, 4.75rem);
      line-height: 0.92;
      letter-spacing: -0.035em;
      text-transform: lowercase;
      text-wrap: balance;
    }

    .brand__lede {
      margin: 0;
      max-width: 22rem;
      color: var(--ink-soft);
      font-size: 1rem;
      font-weight: 450;
      line-height: 1.65;
      text-wrap: pretty;
    }

    .spec {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
    }

    .spec > div {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: calc(var(--space) * 1.5);
      padding: calc(var(--space) * 1.5) 0;
      border-bottom: 1px solid var(--line);
    }

    .spec dt {
      margin: 0;
      color: var(--ink-faint);
      font-size: 0.8125rem;
      font-weight: 500;
    }

    .spec dd {
      margin: 0;
      font-size: 0.9375rem;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .stage {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 3);
      animation: rise var(--dur) var(--ease-out) 100ms both;
    }

    .board {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 3);
      padding: calc(var(--space) * 4);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, var(--bg-elevated), var(--surface));
      box-shadow: var(--shadow);
      min-height: 320px;
      transition: border-color 200ms var(--ease-out);
    }

    .board.is-drawing {
      border-color: oklch(0.72 0.08 28 / 0.55);
    }

    .board__label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: calc(var(--space) * 2);
    }

    .board__label span {
      font-size: 0.75rem;
      font-weight: 650;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .board__live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink-faint);
    }

    .board__live i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: oklch(0.68 0.15 145);
      box-shadow: 0 0 0 3px oklch(0.68 0.15 145 / 0.2);
    }

    .trough {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: calc(var(--space) * 2);
      padding: calc(var(--space) * 2) 0;
      min-height: 120px;
    }

    .trough.is-drawing {
      background: linear-gradient(
        90deg,
        transparent,
        var(--accent-soft),
        transparent
      );
      background-size: 220% 100%;
      animation: shimmer 1s linear infinite;
      border-radius: var(--radius-sm);
    }

    .empty {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.95rem;
      line-height: 1.65;
      max-width: 28rem;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: calc(var(--space) * 2.5);
    }

    .set-row { display: flex; flex-direction: column; gap: calc(var(--space) * 1); }
    .set-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-faint);
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: calc(var(--space) * 1.5);
      align-items: center;
    }

    .ball {
      position: relative;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.55rem;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      border: 2px solid oklch(0.3 0.04 250 / 0.1);
      box-shadow:
        inset 0 -12px 20px oklch(0.2 0.03 250 / 0.16),
        inset 0 7px 12px oklch(1 0 0 / 0.38),
        var(--shadow-sm);
      opacity: 0;
      transform: translateY(10px) scale(0.92);
      overflow: hidden;
      isolation: isolate;
    }

    .ball__n { position: relative; z-index: 2; }

    .ball::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        radial-gradient(circle at 32% 28%, oklch(1 0 0 / 0.55), transparent 40%),
        radial-gradient(circle at 70% 78%, oklch(0.15 0.03 250 / 0.22), transparent 48%);
      pointer-events: none;
      z-index: 1;
    }

    .ball::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0.42;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
      pointer-events: none;
      z-index: 1;
    }

    .ball.is-in {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: pop-in 380ms var(--ease-out);
      transition: transform 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
    }

    .ball.is-in:not(.is-spinning):hover {
      transform: translateY(-7px) scale(1.08);
      box-shadow:
        inset 0 -12px 20px oklch(0.2 0.03 250 / 0.16),
        inset 0 7px 12px oklch(1 0 0 / 0.38),
        0 4px 8px oklch(0.3 0.03 255 / 0.08),
        0 16px 28px oklch(0.3 0.03 255 / 0.12);
    }

    .ball.is-spinning {
      opacity: 1;
      animation: tick 0.22s var(--ease-move) infinite alternate;
    }

    .ball--r1 { background: var(--ball-1); }
    .ball--r2 { background: var(--ball-2); color: oklch(0.98 0.01 250); border-color: oklch(0.45 0.08 250 / 0.25); }
    .ball--r3 { background: var(--ball-3); color: oklch(0.98 0.01 28); border-color: oklch(0.45 0.1 28 / 0.25); }
    .ball--r4 { background: var(--ball-4); }
    .ball--r5 { background: var(--ball-5); color: oklch(0.98 0.01 155); border-color: oklch(0.45 0.08 155 / 0.25); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      gap: calc(var(--space) * 2);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--ink-faint);
    }

    .select-shell { position: relative; display: inline-block; }

    .select-shell::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid var(--ink-soft);
      border-bottom: 2px solid var(--ink-soft);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    .field select {
      height: var(--control-h);
      min-width: 96px;
      padding: 0 40px 0 16px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
    }

    .btn {
      height: var(--control-h);
      padding: 0 28px;
      border: none;
      border-radius: 9999px;
      background: var(--accent);
      color: var(--accent-ink);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.9375rem;
      letter-spacing: -0.02em;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: background-color 140ms var(--ease-out);
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { cursor: wait; opacity: 0.72; }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: calc(var(--space) * 1.5);
    }

    .meta {
      margin: 0;
      font-size: 0.875rem;
      color: var(--ink-soft);
      animation: fade 180ms var(--ease-out) both;
    }

    .meta strong {
      color: var(--ink);
      font-weight: 650;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .history {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: calc(var(--space) * 3);
      box-shadow: var(--shadow-sm);
      animation: rise var(--dur) var(--ease-out) 140ms both;
    }

    .history-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: calc(var(--space) * 2);
      margin-bottom: calc(var(--space) * 1.5);
    }

    .history h2 {
      margin: 0;
      font-size: 0.8125rem;
      font-weight: 650;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
    }

    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--line);
    }

    .history-list li {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: calc(var(--space) * 1.5);
      align-items: center;
      padding: calc(var(--space) * 1.5) 0;
      border-bottom: 1px solid var(--line);
      font-variant-numeric: tabular-nums;
      animation: row 280ms var(--ease-out) both;
    }

    .history-list li:nth-child(1) { animation-delay: 0ms; }
    .history-list li:nth-child(2) { animation-delay: 40ms; }
    .history-list li:nth-child(3) { animation-delay: 80ms; }
    .history-list li:nth-child(4) { animation-delay: 120ms; }

    .history-list .when {
      font-size: 0.8125rem;
      color: var(--ink-faint);
      font-weight: 500;
    }

    .history-list .nums {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 6px;
      border-radius: var(--radius-xs);
      background: var(--bg);
      border: 1px solid var(--line);
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .history-dialog {
      width: min(560px, calc(100vw - 2rem));
      max-height: min(80dvh, 720px);
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    .history-dialog::backdrop {
      background: oklch(0.2 0.03 255 / 0.42);
    }

    .history-dialog[open] {
      animation: rise 280ms var(--ease-out);
    }

    .history-dialog__bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: calc(var(--space) * 2);
      padding: calc(var(--space) * 2.5) calc(var(--space) * 3);
      border-bottom: 1px solid var(--line);
    }

    .history-dialog__bar h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .history-dialog__body {
      padding: 0 calc(var(--space) * 3) calc(var(--space) * 3);
      overflow: auto;
      max-height: calc(min(80dvh, 720px) - 64px);
    }

    .history-dialog .history-list li {
      grid-template-columns: 7.5rem 1fr;
    }

    .history-dialog__more {
      margin-top: calc(var(--space) * 2);
      width: 100%;
    }

    .btn-ghost {
      height: 40px;
      padding: 0 20px;
      border: 1px solid var(--line-strong);
      border-radius: 9999px;
      background: var(--surface);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 650;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background-color 140ms var(--ease-out), border-color 140ms var(--ease-out);
    }

    .btn-ghost:hover {
      background: var(--bg);
      border-color: oklch(0.75 0.02 240);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--ink-soft);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      transition: background-color 140ms var(--ease-out), color 140ms var(--ease-out);
    }

    .btn-icon:hover {
      background: var(--bg);
      color: var(--ink);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes rule {
      from { transform: scaleX(0); opacity: 0; }
      to { transform: scaleX(1); opacity: 1; }
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes row {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop-in {
      0% { opacity: 0; transform: translateY(12px) scale(0.9); }
      70% { opacity: 1; transform: translateY(-3px) scale(1.04); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes tick {
      from { transform: translateY(-2px) rotate(-3deg); }
      to { transform: translateY(3px) rotate(3deg); }
    }

    @keyframes shimmer {
      from { background-position: 100% 0; }
      to { background-position: -100% 0; }
    }

    @media (max-width: 860px) {
      .app { width: min(100% - 1.5rem, 720px); padding-top: calc(var(--space) * 2); }
      .layout { grid-template-columns: 1fr; }
      .rail { order: 1; }
      .stage { order: 0; }
      .brand__title { font-size: clamp(2.75rem, 14vw, 3.75rem); }
      .ball { width: 56px; height: 56px; font-size: 1.3rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .select-shell, .field select, .btn { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .topbar, .rail, .stage, .history, .brand__rule,
      .history-dialog[open], .meta, .history-list li, .ball.is-in {
        animation: fade 160ms linear both;
        transform: none;
      }
      .ball.is-spinning, .trough.is-drawing { animation: none; }
      .ball.is-in:not(.is-spinning):hover { transform: none; }
      .trough.is-drawing { background: var(--accent-soft); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar__brand">
        <p class="topbar__mark">lottery</p>
        <span class="topbar__badge">6 / 45</span>
      </div>
      <button type="button" class="link-btn" id="open-all-history">전체기록 보기</button>
    </header>

    <div class="layout">
      <aside class="rail">
        <div>
          <div class="brand__rule" aria-hidden="true"></div>
          <h1 class="brand__title">lottery</h1>
          <p class="brand__lede">1부터 45까지, 여섯 개. 버튼을 누르면 바로 뽑고 기록이 저장됩니다.</p>
        </div>
        <dl class="spec">
          <div>
            <dt>범위</dt>
            <dd>1 ~ 45</dd>
          </div>
          <div>
            <dt>개수</dt>
            <dd>6</dd>
          </div>
          <div>
            <dt>저장</dt>
            <dd>lotto_draw</dd>
          </div>
        </dl>
      </aside>

      <main class="stage">
        <section class="board" id="board" aria-labelledby="result-label">
          <div class="board__label">
            <span id="result-label">추첨 결과</span>
            <span class="board__live"><i aria-hidden="true"></i>기록 동기화</span>
          </div>

          <div class="trough" id="trough">
            <p class="empty" id="empty">아직 번호가 없습니다. 세트를 고른 뒤 추첨하세요.</p>
            <div class="results" id="results" hidden aria-live="polite"></div>
          </div>

          <div class="controls">
            <div class="field">
              <label for="sets">세트</label>
              <div class="select-shell">
                <select id="sets" name="sets">
                  <option value="1" selected>1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="5">5</option>
                </select>
              </div>
            </div>
            <button type="button" class="btn" id="draw">번호 추첨</button>
          </div>

          <div class="meta-row">
            <p class="meta" id="meta" hidden>
              이번 회차 <strong id="drawn-at"></strong>
              · 조합 <strong id="combo-count">0</strong>개
            </p>
            <p class="meta" id="db-status" hidden></p>
          </div>
        </section>

        <section class="history" id="history-wrap" hidden>
          <div class="history-head">
            <h2>최근 추첨</h2>
          </div>
          <ol class="history-list" id="history"></ol>
        </section>
      </main>
    </div>
  </div>

  <dialog class="history-dialog" id="history-dialog" aria-labelledby="history-dialog-title">
    <div class="history-dialog__bar">
      <h2 id="history-dialog-title">전체 추첨 기록</h2>
      <button type="button" class="btn-icon" id="close-all-history" aria-label="닫기">×</button>
    </div>
    <div class="history-dialog__body">
      <ol class="history-list" id="history-all"></ol>
      <button type="button" class="btn-ghost history-dialog__more" id="load-more-history" hidden>더 보기</button>
      <p class="meta" id="all-db-status" hidden></p>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const POOL = 45;
    const PICK = 6;
    const STAGGER_MS = 65;
    const SPIN_MS = 520;
    const HISTORY_LIMIT = 8;
    const PAGE_SIZE = 30;

    const SUPABASE_URL = "https://uuqpsswvpebtawpcgvaa.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1cXBzc3d2cGVidGF3cGNndmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjE5MzMsImV4cCI6MjA5NzU5NzkzM30.sXpeYxjA55mvq4z0jK-Id4HUOY-rz3rR7TP6_XO3I7c";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      empty: document.getElementById("empty"),
      results: document.getElementById("results"),
      draw: document.getElementById("draw"),
      sets: document.getElementById("sets"),
      meta: document.getElementById("meta"),
      drawnAt: document.getElementById("drawn-at"),
      comboCount: document.getElementById("combo-count"),
      historyWrap: document.getElementById("history-wrap"),
      history: document.getElementById("history"),
      trough: document.getElementById("trough"),
      board: document.getElementById("board"),
      dbStatus: document.getElementById("db-status"),
      openAll: document.getElementById("open-all-history"),
      closeAll: document.getElementById("close-all-history"),
      dialog: document.getElementById("history-dialog"),
      historyAll: document.getElementById("history-all"),
      loadMore: document.getElementById("load-more-history"),
      allDbStatus: document.getElementById("all-db-status"),
    };

    let drawing = false;
    let allOffset = 0;
    let allTotal = 0;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function ballRange(n) {
      if (n <= 10) return 1;
      if (n <= 20) return 2;
      if (n <= 30) return 3;
      if (n <= 40) return 4;
      return 5;
    }

    function pickNumbers() {
      const bag = Array.from({ length: POOL }, (_, i) => i + 1);
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
      return bag.slice(0, PICK).sort((a, b) => a - b);
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function formatTime(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function formatDateTime(d) {
      return `${pad(d.getMonth() + 1)}.${pad(d.getDate())} ${formatTime(d)}`;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setStatus(el, message, isError = false) {
      if (!message) {
        el.hidden = true;
        el.textContent = "";
        return;
      }
      el.hidden = false;
      el.textContent = message;
      el.style.color = isError ? "var(--accent)" : "var(--ink-soft)";
    }

    function setDbStatus(message, isError = false) {
      setStatus(els.dbStatus, message, isError);
    }

    function historyItemHtml(row, { withDate = false } = {}) {
      const at = new Date(row.created_at);
      const label = withDate ? formatDateTime(at) : formatTime(at);
      return `
        <li>
          <span class="when">${label}</span>
          <span class="nums">${row.numbers.map((n) => `<span class="chip">${n}</span>`).join("")}</span>
        </li>`;
    }

    function makeBall(n, { spinning = false, delay = 0 } = {}) {
      const el = document.createElement("span");
      el.className = `ball ball--r${ballRange(n)}${spinning ? " is-spinning" : ""}`;
      el.innerHTML = `<span class="ball__n">${n}</span>`;
      if (!spinning && !reduceMotion) el.style.animationDelay = `${delay}ms`;
      if (spinning) el.classList.add("is-in");
      return el;
    }

    function renderSets(sets, { spinning = false } = {}) {
      els.results.hidden = false;
      els.empty.hidden = true;
      els.results.innerHTML = "";

      const showLabel = sets.length > 1;
      const balls = [];

      sets.forEach((numbers, setIndex) => {
        const row = document.createElement("div");
        row.className = "set-row";

        if (showLabel) {
          const label = document.createElement("div");
          label.className = "set-label";
          label.textContent = `세트 ${setIndex + 1}`;
          row.appendChild(label);
        }

        const wrap = document.createElement("div");
        wrap.className = "balls";
        numbers.forEach((n, i) => {
          const ball = makeBall(n, {
            spinning,
            delay: (setIndex * PICK + i) * STAGGER_MS,
          });
          wrap.appendChild(ball);
          balls.push(ball);
        });
        row.appendChild(wrap);
        els.results.appendChild(row);
      });

      if (!spinning) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => balls.forEach((el) => el.classList.add("is-in")));
        });
      }
    }

    function renderHistory(rows) {
      if (!rows.length) {
        els.historyWrap.hidden = true;
        return;
      }
      els.historyWrap.hidden = false;
      els.history.innerHTML = rows.map((row) => historyItemHtml(row)).join("");
    }

    async function loadHistory() {
      const { data, error } = await db
        .from("lotto_draw")
        .select("id, numbers, created_at")
        .order("created_at", { ascending: false })
        .limit(HISTORY_LIMIT);

      if (error) {
        setDbStatus("기록 불러오기 실패: " + error.message, true);
        return;
      }
      setDbStatus("");
      renderHistory(data || []);
    }

    async function fetchHistoryPage(offset, append) {
      const { data, error, count } = await db
        .from("lotto_draw")
        .select("id, numbers, created_at", { count: "exact" })
        .order("created_at", { ascending: false })
        .range(offset, offset + PAGE_SIZE - 1);

      if (error) {
        setStatus(els.allDbStatus, "전체 기록 불러오기 실패: " + error.message, true);
        return;
      }

      setStatus(els.allDbStatus, "");
      allTotal = count ?? allTotal;
      const rows = data || [];
      const html = rows.map((row) => historyItemHtml(row, { withDate: true })).join("");

      if (append) els.historyAll.insertAdjacentHTML("beforeend", html);
      else els.historyAll.innerHTML = html || "<li><span class=\"when\">기록 없음</span></li>";

      allOffset = offset + rows.length;
      els.loadMore.hidden = allOffset >= allTotal || rows.length === 0;
    }

    async function openAllHistory() {
      allOffset = 0;
      allTotal = 0;
      els.historyAll.innerHTML = "";
      els.loadMore.hidden = true;
      els.dialog.showModal();
      await fetchHistoryPage(0, false);
    }

    async function saveDraws(sets) {
      const { error } = await db.from("lotto_draw").insert(sets.map((numbers) => ({ numbers })));
      if (error) {
        setDbStatus("저장 실패: " + error.message, true);
        return false;
      }
      setDbStatus("");
      return true;
    }

    async function runDraw() {
      if (drawing) return;
      drawing = true;
      els.draw.disabled = true;
      els.trough.classList.add("is-drawing");
      els.board.classList.add("is-drawing");

      const count = Number(els.sets.value) || 1;
      const sets = Array.from({ length: count }, () => pickNumbers());

      if (!reduceMotion) {
        renderSets(
          [Array.from({ length: PICK }, () => 1 + Math.floor(Math.random() * POOL))],
          { spinning: true }
        );
        await sleep(SPIN_MS);
      }

      renderSets(sets);

      const now = new Date();
      els.meta.hidden = false;
      els.meta.style.animation = "none";
      void els.meta.offsetWidth;
      els.meta.style.animation = "";
      els.drawnAt.textContent = formatTime(now);
      els.comboCount.textContent = String(count);

      await saveDraws(sets);
      await loadHistory();

      els.trough.classList.remove("is-drawing");
      els.board.classList.remove("is-drawing");
      drawing = false;
      els.draw.disabled = false;
      els.draw.focus();
    }

    els.draw.addEventListener("click", runDraw);
    els.openAll.addEventListener("click", openAllHistory);
    els.closeAll.addEventListener("click", () => els.dialog.close());
    els.loadMore.addEventListener("click", () => fetchHistoryPage(allOffset, true));
    els.dialog.addEventListener("click", (e) => {
      if (e.target === els.dialog) els.dialog.close();
    });
    loadHistory();
  </script>
</body>
</html>
